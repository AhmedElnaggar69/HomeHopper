{% extends "base.html" %}
<!-- prettier-ignore -->
{% block title %}Login{% endblock %}
<!-- prettier-ignore -->
{% block content %}
<h1>Login</h1>

<form action="{% url 'login_url' %}" method="post">
  {% csrf_token %}

  <label for="{{ form.username.id_for_label }}">Username</label>
  {{ form.username }}

  <label for="{{ form.password.id_for_label }}">Password</label>
  {{ form.password }}

  <button type="submit">LOGIN</button>
</form>

{% if form.errors %}
<p style="color: red; text-align: center">{{ form.errors }}</p>
{% endif %}
<!-- prettier-ignore -->
{% endblock %}
